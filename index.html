<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Security+ Test</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

.card {
  background: #1e293b;
  padding: 20px;
  margin: 20px auto;
  width: 80%;
  border-radius: 12px;
}

button {
  padding: 10px;
  margin: 8px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}

.option {
  display: block;
  width: 60%;
  margin: 10px auto;
  background: #334155;
  color: white;
}

.correct { background: green !important; }
.wrong { background: red !important; }
</style>
</head>

<body>

<h1>Security+ Trainer</h1>

<div class="card">
  <h2 id="question">Loading...</h2>
  <div id="answers"></div>
  <p id="score"></p>
</div>

<script>
// SIMPLE SAFE VERSION (NO CRASH POSSIBLE)

const questions = [
  {
    q: "What is phishing?",
    a: "Tricking users into giving sensitive data",
    options: [
      "Tricking users into giving sensitive data",
      "Firewall type",
      "Encryption method",
      "Backup system"
    ],
    explanation: "Phishing is a social engineering attack using fake messages or websites."
  },
  {
    q: "What does ransomware do?",
    a: "Encrypts files and demands payment",
    options: [
      "Encrypts files and demands payment",
      "Deletes logs",
      "Speeds CPU",
      "Opens firewall"
    ],
    explanation: "Ransomware locks your files and asks for money to unlock them."
  },
  {
    q: "What is TLS used for?",
    a: "Encrypts data in transit",
    options: [
      "Encrypts data in transit",
      "Stores passwords",
      "Detects viruses",
      "Blocks spam"
    ],
    explanation: "TLS protects data sent over the internet (HTTPS)."
  }
];

let index = 0;
let score = 0;

function show() {
  const q = questions[index];

  document.getElementById("question").innerText = q.q;

  const answers = document.getElementById("answers");
  answers.innerHTML = "";

  document.getElementById("score").innerText =
    "Score: " + score;

  q.options.forEach(opt => {
    const btn = document.createElement("button");
    btn.className = "option";
    btn.innerText = opt;

    btn.onclick = () => {

      if (opt === q.a) {
        btn.classList.add("correct");
        score++;
        document.getElementById("score").innerText = "Score: " + score;
      } else {
        btn.classList.add("wrong");

        answers.innerHTML += `
          <div class="card">
            <h3>❌ Wrong</h3>
            <p><b>Correct:</b> ${q.a}</p>
            <p>${q.explanation}</p>
            <button onclick="next()">Next Question</button>
          </div>
        `;
      }
    };

    answers.appendChild(btn);
  });
}

function next() {
  index++;
  if (index >= questions.length) index = 0;
  show();
}

show();
</script>

</body>
</html>
