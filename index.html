<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Security+ Trainer FIXED</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

.card {
  background: #1e293b;
  padding: 20px;
  margin: 20px auto;
  width: 80%;
  border-radius: 12px;
}

button {
  padding: 10px;
  margin: 8px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}

.option {
  display: block;
  width: 60%;
  margin: 10px auto;
  background: #334155;
  color: white;
}

.correct { background: green !important; }
.wrong { background: red !important; }
</style>
</head>

<body>

<h1>🛡 Security+ Trainer</h1>

<div class="card">
  <h2 id="question"></h2>
  <div id="answers"></div>
  <p id="score"></p>
  <div id="feedback"></div>
</div>

<script>

// ================= DATA =================

const questions = [
  {
    q: "What is phishing?",
    a: "Tricking users into giving sensitive data",
    options: [
      "Tricking users into giving sensitive data",
      "Firewall type",
      "Encryption method",
      "Backup system"
    ],
    explanation: "Phishing uses fake emails or websites to steal information."
  },
  {
    q: "What does ransomware do?",
    a: "Encrypts files and demands payment",
    options: [
      "Encrypts files and demands payment",
      "Deletes logs",
      "Speeds CPU",
      "Opens firewall"
    ],
    explanation: "Ransomware locks files and demands money to unlock them."
  },
  {
    q: "What is TLS used for?",
    a: "Encrypts data in transit",
    options: [
      "Encrypts data in transit",
      "Stores passwords",
      "Detects viruses",
      "Blocks spam"
    ],
    explanation: "TLS secures communication like HTTPS websites."
  }
];

// ================= STATE =================

let index = 0;
let score = 0;

// ================= FUNCTIONS =================

function show() {

  const q = questions[index];

  document.getElementById("question").innerText = q.q;
  document.getElementById("score").innerText = "Score: " + score;

  const answers = document.getElementById("answers");
  const feedback = document.getElementById("feedback");

  // IMPORTANT: clear safely
  answers.innerHTML = "";
  feedback.innerHTML = "";

  q.options.forEach(opt => {

    const btn = document.createElement("button");
    btn.className = "option";
    btn.textContent = opt;

    btn.addEventListener("click", function () {

      if (opt === q.a) {
        btn.classList.add("correct");
        score++;
        document.getElementById("score").innerText = "Score: " + score;
      } else {
        btn.classList.add("wrong");

        feedback.innerHTML = `
          <div class="card">
            <h3>❌ Wrong Answer</h3>
            <p><b>Correct:</b> ${q.a}</p>
            <p>${q.explanation}</p>
            <button onclick="next()">Next Question</button>
          </div>
        `;
      }

    });

    answers.appendChild(btn);
  });
}

function next() {
  index++;
  if (index >= questions.length) index = 0;
  show();
}

// START
show();

</script>

</body>
</html>
